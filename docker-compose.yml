services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    environment:
      - TZ=Asia/Shanghai
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - MODE=onebot
      # 快速登录：填你的 QQ 号，重启后自动登录，不需要重新扫码
      - ACCOUNT=3811851103
    ports:
      # NapCat WebUI
      - "18741:18741"
      # OneBot HTTP / WebSocket 端口
      - "18742:18742"
    volumes:
      # 映射 NapCat 配置和数据到当前项目目录
      - ./data:/app/napcat
    restart: unless-stopped

  qq-bot:
    image: moment073/qq-bot:latest
    container_name: qq-bot
    environment:
      # 和 napcat 同网，用服务名连接
      - ONEBOT_WS_URL=ws://napcat:18742
      - RWKV_BASE_URL=${RWKV_BASE_URL:-http://154.37.222.49:8193}
      - RWKV_PASSWORD=${RWKV_PASSWORD:-}
      - AI_SYSTEM_PROMPT=${AI_SYSTEM_PROMPT:-你是一个有帮助的 QQ 群/私聊机器人，回答简洁友好，使用中文。}
      - RWKV_MAX_TOKENS=${RWKV_MAX_TOKENS:-512}
      - HISTORY_LIMIT=${HISTORY_LIMIT:-20}
      - GROUP_LOG_LIMIT=${GROUP_LOG_LIMIT:-30}
    depends_on:
      - napcat
    restart: unless-stopped

