name: Build and Push Docker Image
# cspell:ignore DOCKERHUB dockerhub buildx qemu gha amd64 arm64 sha7

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_NAME: qq-bot
      # Define keys so editors can validate `${{ env.* }}` usage.
      # Real values are injected per-step from `secrets.*`.
      DOCKERHUB_USERNAME: ""
      DOCKERHUB_TOKEN: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Docker Hub secrets exist
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets['DOCKERHUB_USERNAME'] }}
          DOCKERHUB_TOKEN: ${{ secrets['DOCKERHUB_TOKEN'] }}
        run: |
          if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
            echo "Missing secret: DOCKERHUB_USERNAME" >&2
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "Missing secret: DOCKERHUB_TOKEN" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets['DOCKERHUB_USERNAME'] }}
          DOCKERHUB_TOKEN: ${{ secrets['DOCKERHUB_TOKEN'] }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKERHUB_USERNAME: ${{ secrets['DOCKERHUB_USERNAME'] }}
        with:
          context: .
          file: ./Dockerfile.allinone
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets['DOCKERHUB_USERNAME'] }}
        run: |
          echo "## Docker Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dockerfile: \`Dockerfile.allinone\` (NapCat + qq-bot)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
